<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 品牌AI博弈仿真实验室</title>
<style>
/* ============================================================
   CSS Variables & Reset
   ============================================================ */
:root {
  --bg: #0f1923;
  --panel-bg: #1a2733;
  --border: #2a3a4a;
  --text: #e0e8f0;
  --text-dim: #8a9ab0;
  --text-bright: #ffffff;
  --accent-blue: #4da6ff;
  --accent-green: #4ecdc4;
  --accent-yellow: #ffd93d;
  --accent-red: #ff6b6b;
  --accent-purple: #b39dff;

  --walmart-blue: #0071dc;
  --walmart-yellow: #ffc220;
  --amazon-orange: #ff9900;
  --costco-red: #e31837;
  --target-red: #cc0000;
  --consumer-teal: #2ec4b6;

  --msg-self: #1e3a5f;
  --msg-walmart: #1a2f1a;
  --msg-amazon: #2f1f0a;
  --msg-costco: #2f1a1a;
  --msg-target: #2f1a1f;
  --msg-consumer: #1a2f2f;

  --radius: 8px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ============================================================
   Header
   ============================================================ */
.header {
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 { font-size: 1.3rem; color: var(--accent-blue); white-space: nowrap; }
.controls-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

/* ============================================================
   Select & Button Styles
   ============================================================ */
select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px;
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
}
select:focus { outline: none; border-color: var(--accent-blue); }

.btn {
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }

.btn-primary { background: var(--accent-blue); color: #fff; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-warning { background: var(--accent-yellow); color: #1a1a1a; }
.btn-danger { background: var(--accent-red); color: #fff; }

.btn-sm { padding: 5px 10px; font-size: 0.78rem; }

/* ============================================================
   Tab Navigation
   ============================================================ */
.tab-nav {
  display: flex;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.tab-btn {
  padding: 14px 24px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  border-bottom: 3px solid transparent;
  transition: all 0.25s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent-blue);
  border-bottom-color: var(--accent-blue);
}

/* ============================================================
   Layer Progress Bar
   ============================================================ */
.layer-progress {
  display: flex;
  gap: 4px;
  padding: 16px 24px;
  justify-content: center;
  background: var(--panel-bg);
  margin: 1px 0;
}
.layer-dot {
  flex: 1;
  max-width: 120px;
  padding: 10px 8px;
  text-align: center;
  border-radius: var(--radius);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.layer-dot .layer-num {
  display: block;
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 2px;
}
.layer-dot.active {
  background: var(--accent-blue);
  color: #fff;
  border-color: var(--accent-blue);
  box-shadow: 0 0 16px rgba(77,166,255,0.4);
}
.layer-dot.done {
  background: rgba(78,205,196,0.15);
  border-color: var(--accent-green);
  color: var(--accent-green);
}
.layer-dot.done::after { content: " ✓"; }

/* ============================================================
   Simulation Area
   ============================================================ */
.sim-container {
  display: none;
  flex-direction: column;
  height: calc(100vh - 340px);
  min-height: 400px;
}
.sim-container.active { display: flex; }

.dialogue-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ============================================================
   Message Bubbles
   ============================================================ */
.msg {
  max-width: 85%;
  padding: 14px 18px;
  border-radius: var(--radius-lg);
  position: relative;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
  animation: msgIn 0.35s ease-out;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg:hover {
  border-color: rgba(255,255,255,0.2);
  transform: translateX(4px);
}

.msg .msg-sender {
  font-size: 0.75rem;
  font-weight: 700;
  margin-bottom: 6px;
  opacity: 0.8;
  display: flex;
  align-items: center;
  gap: 6px;
}
.msg .msg-text { font-size: 0.9rem; line-height: 1.6; }
.msg .msg-layer-tag {
  display: inline-block;
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}

/* Brand-specific msg styles */
.msg-walmart { background: var(--msg-walmart); align-self: flex-start; border-left: 3px solid var(--walmart-blue); }
.msg-walmart .msg-sender { color: var(--walmart-yellow); }
.msg-walmart .msg-layer-tag { background: rgba(0,113,220,0.3); color: #8cc4ff; }

.msg-amazon { background: var(--msg-amazon); align-self: flex-start; border-left: 3px solid var(--amazon-orange); }
.msg-amazon .msg-sender { color: var(--amazon-orange); }
.msg-amazon .msg-layer-tag { background: rgba(255,153,0,0.3); color: #ffb84d; }

.msg-costco { background: var(--msg-costco); align-self: flex-start; border-left: 3px solid var(--costco-red); }
.msg-costco .msg-sender { color: #ff6b6b; }
.msg-costco .msg-layer-tag { background: rgba(227,24,55,0.3); color: #ff8c94; }

.msg-target { background: var(--msg-target); align-self: flex-start; border-left: 3px solid var(--target-red); }
.msg-target .msg-sender { color: #ff8080; }
.msg-target .msg-layer-tag { background: rgba(204,0,0,0.3); color: #ff9999; }

.msg-consumer { background: var(--msg-consumer); align-self: flex-end; border-right: 3px solid var(--consumer-teal); }
.msg-consumer .msg-sender { color: var(--consumer-teal); }
.msg-consumer .msg-layer-tag { background: rgba(46,196,182,0.3); color: #7ce8dd; }

.msg-system {
  align-self: center;
  background: rgba(255,255,255,0.03);
  border: 1px dashed var(--border);
  color: var(--text-dim);
  font-size: 0.82rem;
  max-width: 95%;
  text-align: center;
  cursor: default;
}
.msg-system:hover { transform: none; border-color: var(--border); }

/* ============================================================
   Decision Detail Panel (expandable)
   ============================================================ */
.detail-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--panel-bg);
  border-top: 2px solid var(--accent-blue);
  box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
  z-index: 100;
  max-height: 50vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.detail-panel.open { transform: translateY(0); }

.detail-inner {
  padding: 20px 24px;
  max-width: 900px;
  margin: 0 auto;
}
.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.detail-header h3 { color: var(--accent-blue); font-size: 1rem; }
.detail-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius);
}
.detail-close:hover { color: var(--text); background: rgba(255,255,255,0.05); }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}
@media (max-width: 800px) { .detail-grid { grid-template-columns: 1fr; } }

.detail-card {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 16px;
  border: 1px solid var(--border);
}
.detail-card h4 {
  font-size: 0.85rem;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.detail-card p { font-size: 0.82rem; color: var(--text-dim); line-height: 1.6; }
.detail-card .tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.detail-card .tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.72rem;
  font-weight: 600;
}
.tag-defense { background: rgba(77,166,255,0.2); color: var(--accent-blue); }
.tag-marketing { background: rgba(255,217,61,0.2); color: var(--accent-yellow); }
.tag-logic { background: rgba(179,157,255,0.2); color: var(--accent-purple); }

/* ============================================================
   Scoreboard (Panel B)
   ============================================================ */
.scoreboard {
  display: flex;
  gap: 12px;
  padding: 12px 24px;
  background: var(--panel-bg);
  border-top: 1px solid var(--border);
  justify-content: center;
}
.score-card {
  flex: 1;
  max-width: 160px;
  background: var(--bg);
  border-radius: var(--radius);
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
  transition: all 0.3s;
}
.score-card .brand-name {
  font-weight: 700;
  font-size: 0.8rem;
  margin-bottom: 6px;
}
.score-card .score-val {
  font-size: 1.5rem;
  font-weight: 700;
}
.score-card.walmart-sc { border-bottom: 3px solid var(--walmart-blue); }
.score-card.amazon-sc { border-bottom: 3px solid var(--amazon-orange); }
.score-card.costco-sc { border-bottom: 3px solid var(--costco-red); }
.score-card.target-sc { border-bottom: 3px solid var(--target-red); }
.score-card.eliminated { opacity: 0.35; text-decoration: line-through; }
.score-card.winner { box-shadow: 0 0 20px rgba(77,166,255,0.5); border-color: var(--accent-blue); }

/* ============================================================
   Toast / Empty state
   ============================================================ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-dim);
  text-align: center;
}
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
.empty-state h3 { margin-bottom: 8px; color: var(--text); }

/* ============================================================
   Scrollbar
   ============================================================ */
.dialogue-area::-webkit-scrollbar { width: 6px; }
.dialogue-area::-webkit-scrollbar-track { background: transparent; }
.dialogue-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ============================================================
   Highlights
   ============================================================ */
.highlight { color: var(--accent-yellow); font-weight: 600; }
.price { color: var(--accent-green); font-weight: 700; }
.warn { color: var(--accent-red); }
.info { color: var(--accent-blue); }
</style>
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<div class="header">
  <h1>🔬 品牌AI博弈仿真实验室</h1>
  <div class="controls-row">
    <select id="categorySelect" title="选择商品品类">
      <option value="household">🧴 日用品（洗衣液）</option>
      <option value="electronics">📱 电子产品（蓝牙耳机）</option>
      <option value="grocery">🥬 生鲜食品（周购清单）</option>
      <option value="furniture">🛋️ 家具家居（书桌）</option>
    </select>
    <select id="personaSelect" title="选择消费者画像">
      <option value="price">💰 价格敏感型</option>
      <option value="quality">🏆 品质优先型</option>
      <option value="convenience">⚡ 便利至上型</option>
    </select>
    <button class="btn btn-primary" onclick="startSimulation()" id="btnStart">▶ 开始仿真</button>
    <button class="btn btn-secondary" onclick="nextLayer()" id="btnNext" style="display:none">⏭ 下一层</button>
    <button class="btn btn-danger btn-sm" onclick="resetAll()" id="btnReset">🔄 重置</button>
  </div>
</div>

<!-- ============================================================
     TAB NAVIGATION
     ============================================================ -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('A')" id="tabBtnA">
    📂 板块A：1v1深度 — 沃尔玛AI vs 消费者AI
  </button>
  <button class="tab-btn" onclick="switchTab('B')" id="tabBtnB">
    📂 板块B：多方竞争 — 四大品牌混战
  </button>
</div>

<!-- ============================================================
     LAYER PROGRESS
     ============================================================ -->
<div class="layer-progress" id="layerProgress">
  <div class="layer-dot" id="layerDot1">
    <span class="layer-num">L1</span>信息收集
  </div>
  <div class="layer-dot" id="layerDot2">
    <span class="layer-num">L2</span>初筛过滤
  </div>
  <div class="layer-dot" id="layerDot3">
    <span class="layer-num">L3</span>比价博弈
  </div>
  <div class="layer-dot" id="layerDot4">
    <span class="layer-num">L4</span>决策下单
  </div>
</div>

<!-- ============================================================
     PANEL A: 1v1 Walmart vs Consumer
     ============================================================ -->
<div class="sim-container active" id="panelA">
  <div class="dialogue-area" id="dialogueA">
    <div class="empty-state">
      <div class="icon">🏪 ↔ 🧑</div>
      <h3>板块A：沃尔玛AI vs 消费者AI</h3>
      <p>展示沃尔玛品牌AI如何逐层应对消费者AI的能力升级<br>点击「开始仿真」启动对话</p>
    </div>
  </div>
</div>

<!-- ============================================================
     PANEL B: Multi-brand Competition
     ============================================================ -->
<div class="sim-container" id="panelB">
  <div class="dialogue-area" id="dialogueB">
    <div class="empty-state">
      <div class="icon">🏪 🏬 🏬 🎯</div>
      <h3>板块B：四大品牌混战</h3>
      <p>沃尔玛、Amazon、Costco、Target 同时面对消费者AI的考验<br>观察不同品牌AI策略的差异化博弈</p>
    </div>
  </div>
  <div class="scoreboard" id="scoreboard" style="display:none">
    <div class="score-card walmart-sc" id="scWalmart">
      <div class="brand-name">🏪 沃尔玛</div>
      <div class="score-val" style="color:var(--walmart-yellow)">--</div>
    </div>
    <div class="score-card amazon-sc" id="scAmazon">
      <div class="brand-name">📦 Amazon</div>
      <div class="score-val" style="color:var(--amazon-orange)">--</div>
    </div>
    <div class="score-card costco-sc" id="scCostco">
      <div class="brand-name">🏬 Costco</div>
      <div class="score-val" style="color:#ff6b6b">--</div>
    </div>
    <div class="score-card target-sc" id="scTarget">
      <div class="brand-name">🎯 Target</div>
      <div class="score-val" style="color:#ff8080">--</div>
    </div>
  </div>
</div>

<!-- ============================================================
     DECISION DETAIL PANEL (bottom slide-up)
     ============================================================ -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-inner">
    <div class="detail-header">
      <h3 id="detailTitle">📋 决策详情</h3>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-grid">
      <div class="detail-card">
        <h4>🛡️ 对抗模式</h4>
        <div class="tag-row" id="detailDefenseTags"></div>
        <p id="detailDefense"></p>
      </div>
      <div class="detail-card">
        <h4>📣 营销模式</h4>
        <div class="tag-row" id="detailMarketingTags"></div>
        <p id="detailMarketing"></p>
      </div>
      <div class="detail-card">
        <h4>🧠 决策逻辑</h4>
        <div class="tag-row" id="detailLogicTags"></div>
        <p id="detailLogic"></p>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script>

// GLOBALS

// ============================================================
function calcScore(brandId, personaKey) {
  const w = PERSONAS[personaKey].weights;
  const base = {
    walmart: { price:90, trust:85, service:80, experience:70 },
    amazon:   { price:70, trust:75, service:95, experience:85 },
    costco:   { price:85, trust:90, service:65, experience:60 },
    target:   { price:65, trust:70, service:75, experience:90 }
  };
  const s = base[brandId];
  return Math.round(s.price*w.price + s.trust*w.trust + s.service*w.service + s.experience*w.experience);
}

        marketing: { strategy:'-', desc:'最终排名揭示了AI博弈对品牌营销的深远影响：\n沃尔玛赢在"均衡"——没有明显短板，每个维度都不错\nCostco赢在"专注"——在信任和价格维度极强，即使便利性得分很低\nAmazon输在"信任扣分"——动态定价和推荐引擎在L2阶段累积了信任债务\nTarget输在"维度不利"——核心优势（体验/设计）在AI评分中权重天然偏低', },
        logic: getWinnerLogic(persona)
      }
    ]
  };
}

    case 'quality': return '沃尔玛对品质优先型用户胜利的关键：可验证的品质证据链。三重认证（EPA+RSPO+碳足迹）每一项都有在线验证链接，这是"不依赖品牌承诺，而是依赖第三方证据"的品质证明策略。在AI的评分框架下，可验证的品质 > 宣称的品质。';
    case 'convenience': return '沃尔玛对便利至上型用户胜利的关键：物理资产的数字化变现。4600家门店 = 4600个前置仓 = 4600个退货点。Amazon的物流网络固然强大，但纯电商模式无法提供"下班路过退个货"的便利。在AI的综合评分中，便利性不是单一维度的速度竞赛，而是全域覆盖的密度游戏。';
    default: return '';
  }
}

// ============================================================
// SIMULATION STATE MACHINE
// ============================================================
let isPlaying = false;

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabBtnA').classList.toggle('active', tab === 'A');
  document.getElementById('tabBtnB').classList.toggle('active', tab === 'B');
  document.getElementById('panelA').classList.toggle('active', tab === 'A');
  document.getElementById('panelB').classList.toggle('active', tab === 'B');
  document.getElementById('scoreboard').style.display = (tab === 'B' && currentLayer > 0) ? 'flex' : 'none';
}

function startSimulation() {
  category = document.getElementById('categorySelect').value;
  persona = document.getElementById('personaSelect').value;
  currentLayer = 1;
  msgCounter = 0;

  // Reset
  document.getElementById('dialogueA').innerHTML = '';
  document.getElementById('dialogueB').innerHTML = '';
  panelBRemaining = ['walmart','amazon','costco','target'];
  panelBScores = { walmart:0, amazon:0, costco:0, target:0 };
  closeDetail();

  // Generate dialogues
  dialogueAMsgs = getDialogueA();
  dialogueBMsgs = getDialogueB();

  // Show scoreboard for panel B
  document.getElementById('scoreboard').style.display = currentTab === 'B' ? 'flex' : 'none';
  updateScoreboard();

  // Play Layer 1
  playLayer(1);

  // Update UI
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnNext').style.display = 'inline-flex';
  updateLayerDots();
}

function playLayer(layer) {
  if (isPlaying) return;
  isPlaying = true;
  currentLayer = layer;
  updateLayerDots();

  const dialogueKey = 'L' + layer;
  const msgsA = dialogueAMsgs[dialogueKey] || [];
  const msgsB = dialogueBMsgs[dialogueKey] || [];

  // Clear dialogue areas for new layer (add separator)
  if (layer > 1) {
    addSystemMsg('dialogueA', `── 进入 Layer ${layer} ──`);
    addSystemMsg('dialogueB', `── 进入 Layer ${layer} ──`);
  }

  // Play messages with staggered timing
  const allMsgs = [];
  msgsA.forEach((m, i) => allMsgs.push({ panel:'A', msg:m, delay: i * 800 }));
  msgsB.forEach((m, i) => allMsgs.push({ panel:'B', msg:m, delay: i * 800 }));

  // Sort by delay and play
  const totalDelay = allMsgs.length * 800 + 500;
  allMsgs.forEach((item, idx) => {
    setTimeout(() => {
      addMessage(item.panel, item.msg);
      if (item.panel === 'B') updatePanelBScores(item.msg);
    }, item.delay + (idx > 0 ? 200 : 0));
  });

  // Update scoreboard and release lock
  setTimeout(() => {
    updateScoreboard();
    isPlaying = false;
  }, totalDelay);
}

function updatePanelBScores(msg) {
  if (!msg.brand) return;
  // Eliminate brands in L2
  if (msg.layer === 2 && msg.sender === 'consumer') {
    // Target and Amazon get warnings but stay
  }
}

function nextLayer() {
  if (isPlaying) return;
  if (currentLayer >= 4) return;
  playLayer(currentLayer + 1);
}

function resetAll() {
  isPlaying = false;
  currentLayer = 0;
  dialogueAMsgs = [];
  dialogueBMsgs = [];
  document.getElementById('dialogueA').innerHTML = `<div class="empty-state"><div class="icon">🏪 ↔ 🧑</div><h3>板块A：沃尔玛AI vs 消费者AI</h3><p>展示沃尔玛品牌AI如何逐层应对消费者AI的能力升级<br>点击「开始仿真」启动对话</p></div>`;
  document.getElementById('dialogueB').innerHTML = `<div class="empty-state"><div class="icon">🏪 🏬 🏬 🎯</div><h3>板块B：四大品牌混战</h3><p>沃尔玛、Amazon、Costco、Target 同时面对消费者AI的考验<br>观察不同品牌AI策略的差异化博弈</p></div>`;
  document.getElementById('scoreboard').style.display = 'none';
  document.getElementById('btnStart').style.display = 'inline-flex';
  document.getElementById('btnNext').style.display = 'none';
  panelBScores = { walmart:0, amazon:0, costco:0, target:0 };
  updateScoreboard();
  updateLayerDots();
  closeDetail();
}

function addMessage(panel, msgData) {
  const containerId = panel === 'A' ? 'dialogueA' : 'dialogueB';
  const container = document.getElementById(containerId);

  // Remove empty state if present
  const emptyState = container.querySelector('.empty-state');
  if (emptyState) emptyState.remove();

  const msgDiv = document.createElement('div');
  const msgId = 'msg-' + (++msgCounter);

  let senderName, cssClass;
  if (msgData.sender === 'consumer') {
    senderName = '🧑 消费者AI';
    cssClass = 'msg-consumer';
  } else if (msgData.sender === 'walmart') {
    senderName = '🏪 沃尔玛AI';
    cssClass = 'msg-walmart';
  } else if (msgData.sender === 'amazon') {
    senderName = '📦 Amazon AI';
    cssClass = 'msg-amazon';
  } else if (msgData.sender === 'costco') {
    senderName = '🏬 Costco AI';
    cssClass = 'msg-costco';
  } else if (msgData.sender === 'target') {
    senderName = '🎯 Target AI';
    cssClass = 'msg-target';
  } else {
    senderName = '📡 系统';
    cssClass = 'msg-system';
  }

  msgDiv.className = 'msg ' + cssClass;
  msgDiv.id = msgId;

  const layerTag = msgData.sender !== 'system'
    ? `<span class="msg-layer-tag">L${msgData.layer}</span>`
    : '';

  msgDiv.innerHTML = `
    <div class="msg-sender">${senderName} ${layerTag} <span style="font-size:0.65rem;opacity:0.5">第${msgData.round}轮</span></div>
    <div class="msg-text">${msgData.text.replace(/\n/g, '<br>')}</div>
  `;

  // Make clickable if it has defense/marketing/logic data
  if (msgData.defense || msgData.marketing || msgData.logic) {
    msgDiv.title = '点击查看决策详情';
    msgDiv.style.cursor = 'pointer';
    msgDiv.addEventListener('click', () => openDetail(msgData, senderName));
  }

  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

function addSystemMsg(containerId, text) {
  const container = document.getElementById(containerId);
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.innerHTML = `<div class="msg-text">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ============================================================
// DECISION DETAIL PANEL
// ============================================================
function openDetail(msgData, senderName) {
  const panel = document.getElementById('detailPanel');

  document.getElementById('detailTitle').textContent = `📋 决策详情 — ${senderName} · Layer ${msgData.layer}`;

  // Defense
  document.getElementById('detailDefenseTags').innerHTML = msgData.defense
    ? `<span class="tag tag-defense">${msgData.defense.strategy}</span><span class="tag tag-defense">Layer ${msgData.defense.layer}</span>`
    : '';
  document.getElementById('detailDefense').textContent = msgData.defense ? msgData.defense.desc : '暂无分析';

  // Marketing
  document.getElementById('detailMarketingTags').innerHTML = msgData.marketing
    ? `<span class="tag tag-marketing">${msgData.marketing.strategy}</span>`
    : '';
  document.getElementById('detailMarketing').textContent = msgData.marketing ? msgData.marketing.desc : '暂无分析';

  // Logic
  document.getElementById('detailLogicTags').innerHTML = msgData.logic
    ? `<span class="tag tag-logic">决策推理</span>`
    : '';
  document.getElementById('detailLogic').textContent = msgData.logic || '暂无分析';

  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

// ============================================================
// SCOREBOARD
// ============================================================
function updateScoreboard() {
  const brands = ['walmart','amazon','costco','target'];
  brands.forEach(b => {
    const score = calcScore(b, persona);
    const el = document.getElementById('sc' + b.charAt(0).toUpperCase() + b.slice(1));
    if (el) {
      el.querySelector('.score-val').textContent = score;
    }
  });

  // Highlight winner in L4
  if (currentLayer >= 4) {
    brands.forEach(b => {
      const el = document.getElementById('sc' + b.charAt(0).toUpperCase() + b.slice(1));
      if (el) {
        el.classList.toggle('winner', b === 'walmart');
      }
    });
  }
}

// ============================================================
// LAYER DOTS
// ============================================================
function updateLayerDots() {
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('layerDot' + i);
    dot.classList.remove('active', 'done');
    if (i === currentLayer) dot.classList.add('active');
    if (i < currentLayer) dot.classList.add('done');
  }
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === 'ArrowRight' && e.ctrlKey) nextLayer();
  if (e.key === '1') switchTab('A');
  if (e.key === '2') switchTab('B');
});
