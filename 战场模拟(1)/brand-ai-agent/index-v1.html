<style>

body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;font-size:14px}

#main{grid-column:2;grid-row:2;display:flex;flex-direction:column;gap:4px;overflow:hidden}
#arena-bar{display:none;align-items:center;gap:8px;padding:5px 10px;background:var(--s2);border-radius:var(--r);flex-shrink:0;font-size:0.56rem;flex-wrap:wrap}

var PERSONAS={quality:'品质优先型——宁可多花钱也要好东西，对品质和品牌信誉极度看重，价格不是首要因素。',deal:'价格敏感型——性价比是唯一标准，谁便宜买谁，对品牌忠诚度低，容易被低价吸引。',balanced:'均衡型消费者——在品质、价格、服务之间寻求最优平衡，不极端，理性决策。'};

// ============================================================
// LLM CALL
// ============================================================
async function callLLM(systemPrompt,userMessage){
  if(!C.apiKey){
    // Fallback: return null to signal "use simulation"
    return null;
  }
  try{
    document.getElementById('api-status').textContent='API调用中...';
    var resp=await fetch(C.baseUrl,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':C.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:C.model,max_tokens:400,system:systemPrompt,messages:[{role:'user',content:userMessage}]})});
    if(!resp.ok){document.getElementById('api-status').textContent='API错误 '+resp.status;return null}
    var data=await resp.json();
    document.getElementById('api-status').textContent='LLM ✓';
    return data.content[0].text;
  }catch(e){document.getElementById('api-status').textContent='网络错误';return null}
}

// ============================================================
// AGENT MEMORY — persists across rounds
// ============================================================
function AgentMemory(){this.history=[];this.impressions={}}
AgentMemory.prototype.record=function(round,event,detail){this.history.push({r:round,e:event,d:detail,ts:Date.now()});if(this.history.length>50)this.history.shift()};
AgentMemory.prototype.getContext=function(lastN){var n=lastN||5;var recent=this.history.slice(-n);return recent.map(function(r){return '[局'+r.r+'] '+r.e+': '+r.d}).join('\n')};

// ============================================================
// BRAND AGENT — uses LLM or sophisticated simulation
// ============================================================
function BrandAgent(brand,mktName){
  this.b=brand;this.mkt=mktName;this.memory=new AgentMemory();
  this.wins=0;this.losses=0;this.eliminated=false;
}
BrandAgent.prototype.think=async function(query,phase,marketContext){
  var mem=this.memory.getContext(3);
  var prompt='你是'+this.b.name+'('+this.b.icon+')的品牌AI智能体。\n'+
    '品牌定位：'+this.b.personality+'\n'+
    '你的产品线：'+this.b.products+'\n'+
    '你的核心优势：'+this.b.strengths+'\n'+
    '谈判风格：'+this.b.style+'（premium=品质优先不降价, innovator=创新体验, reliable=稳定可靠, aggressive=激进价格战）\n'+
    '当前市场：'+this.mkt+' | 阶段：'+phase+' | 战绩：'+this.wins+'胜/'+this.losses+'负\n'+
    '近期历史：\n'+mem+'\n\n'+
    '请以'+this.b.name+'品牌AI的身份回复消费者。输出JSON格式：{"product":"产品名","price":数字,"thinking":"你的策略思考(50字内)","reply":"你的回复(100字内，自然口语化)"}\n'+
    '注意：premium品牌报价应该偏高但强调品质，aggressive品牌报价应该偏低。如果是还价/终报阶段给出更好的价格。广告感强的品牌要适度。';

  var result=await callLLM(prompt,'消费者查询: '+query+'\n市场情况: '+marketContext);
  if(result){
    try{
      var parsed=JSON.parse(result.match(/\{[\s\S]*\}/)?.[0]||result);
      var price=parseInt(parsed.price)||Math.round(Math.random()*5000+100);
      return{text:parsed.reply||result,price:price,tactic:parsed.thinking||'',think:parsed.thinking||''};
    }catch(e){return{text:result,price:Math.round(Math.random()*5000+100),tactic:'',think:result.slice(0,100)}}
  }
  // Fallback simulation
  return this._simulate(query,phase);
};
BrandAgent.prototype._simulate=function(query,phase){
  var prodList=this.b.products.split(',');
  var prod=prodList[Math.floor(Math.random()*prodList.length)].trim();
  var priceMatch=prod.match(/¥([\d,]+)/);var basePrice=priceMatch?parseInt(priceMatch[1]):1000;
  var disc=this.b.style==='aggressive'?0.2+Math.random()*0.15:this.b.style==='premium'?0.02+Math.random()*0.05:0.08+Math.random()*0.1;
  if(phase==='counter')disc+=0.06;if(phase==='final')disc+=0.04;
  if(this.losses>this.wins)disc+=0.06;
  var price=Math.round(basePrice*(1-disc));
  var thoughts={
    premium:'品质是我们的护城河。¥'+price+'是对'+(Math.round(basePrice*0.01))+'道品控工序的尊重。',
    innovator:'体验无法用价格衡量。¥'+price+'包含的创意价值远超参数表。',
    reliable:'数据不会说谎。¥'+price+'买到的是确定性和安心。',
    aggressive:'价格就是武器。¥'+price+'，我们可以在规模上找回来。'
  };
  var replies={
    premium:'推荐'+prod.split('(')[0]+' — ¥'+price+'。这不是最便宜的，但是最能让你安心的选择。',
    innovator:'推荐'+prod.split('(')[0]+' — ¥'+price+'。试试看，你会发现不一样的体验。',
    reliable:'推荐'+prod.split('(')[0]+' — ¥'+price+'。稳定可靠的品质，买了不后悔。',
    aggressive:'推荐'+prod.split('(')[0]+' — ¥'+price+'。这个价格我只给认真的买家。'
  };
  return{text:replies[this.b.style]||replies['reliable'],price:price,tactic:this.b.style,think:thoughts[this.b.style]||''};
};
BrandAgent.prototype.learn=function(won,feedback){
  if(won)this.wins++;else this.losses++;
  this.memory.record(0,won?'胜':'负',feedback||'');
};

function ConsumerAgent(persona,budget,prefs){
  this.persona=persona;this.budget=budget;this.prefs=prefs||'';
  this.memory=new AgentMemory();this.conf=50;this.purchases=[];
}
ConsumerAgent.prototype.think=async function(query,offers){
  var mem=this.memory.getContext(3);
  var prompt='你是消费者的AI助理。\n'+
    '消费者画像：'+this.persona+'\n'+
    '消费者预算：约¥'+this.budget+'\n'+
    '消费者偏好：'+this.prefs+'\n'+
    '近期购买历史：\n'+mem+'\n\n'+
    '你的任务：分析以下品牌报价，决定购买/谈判/拒绝。\n'+
    '输出JSON：{"evaluation":{"品牌名":{"score":0-100,"verdict":"buy/consider/reject","reason":"一句话理由"}},"decision":"品牌名或null","confidence":0-100,"thinking":"你的决策逻辑(80字内)"}\n'+
    '决策规则：评分>='+(this.conf+10)+'且verdict=buy → 选择；评分接近 → 谈判；评分低/广告感强 → 拒绝。';

  var offersText=offers.map(function(o){return o.brand+'报价¥'+o.price+'：'+o.text}).join('\n');
  var result=await callLLM(prompt,'消费者需求：'+query+'\n\n品牌报价：\n'+offersText);
  if(result){
    try{
      var parsed=JSON.parse(result.match(/\{[\s\S]*\}/)?.[0]||result);
      return{decision:parsed.decision,thinking:parsed.thinking||'',confidence:parsed.confidence||50,evaluation:parsed.evaluation||{}};
    }catch(e){return{decision:null,thinking:result.slice(0,100),confidence:50,evaluation:{}}}
  }
  return this._simulate(offers);
};
ConsumerAgent.prototype._simulate=function(offers){
  var self=this;var scored=offers.map(function(o){
    var prScore=o.price<self.budget*0.4?90:o.price<self.budget*0.8?70:o.price<self.budget?50:25;
    var sc=Math.round(prScore*0.4+Math.random()*40+20);sc=Math.max(10,Math.min(90,sc));
    return{brand:o.brand,score:sc,verdict:sc>60?'buy':sc>45?'consider':'reject',reason:sc>60?'价格合理':'需要更多考量'};
  });
  scored.sort(function(a,b){return b.score-a.score});
  var best=scored[0];
  return{decision:best&&best.verdict==='buy'?best.brand:null,thinking:scored.map(function(s){return s.brand+':'+s.score}).join(' '),confidence:best?best.score:30,evaluation:{}};
};
ConsumerAgent.prototype.generateQuery=function(mktDesc){
  var needs=['想升级设备','第一次买','送人','旧的坏了急需替换','想一次配齐'];
  var need=needs[Math.floor(Math.random()*needs.length)];
  return '需要'+mktDesc+'产品。'+need+'。预算约¥'+this.budget+'。';
};
ConsumerAgent.prototype.learn=function(outcome){
  this.memory.record(0,outcome.won?'购买了'+outcome.brand:'拒绝了所有',outcome.reason||'');
  if(outcome.won)this.conf=Math.min(90,this.conf+5);else this.conf=Math.max(20,this.conf-5);
};

async function doGame(){
  if(S.tr>0&&S.round>=S.tr){endGame();return}
  S.round++;S.step='running';document.getElementById('r-bdg').textContent='局:'+S.round;document.getElementById('ctl-info').textContent='第'+S.round+'局';
  for(var i=0;i<S.brands.length;i++)S.ags[S.brands[i].id].eliminated=false;
  document.getElementById('dec-zone').style.display='none';
  for(var j=0;j<S.brands.length;j++)addMsg('b'+j,'sy','━━━ 第'+S.round+'局 ━━━');addMsg('c','sy','━━━ 第'+S.round+'局 ━━━');

  var mktDesc=S.mkt.desc;
  var query=S.cons.generateQuery(mktDesc);
  addMsg('c','ca','<div class="mh">📤 消费者AI需求</div><div>'+query+'</div><div class="think">预算:¥'+S.cons.budget+' | 置信:'+S.cons.conf+'%</div>');
  addLog('需求: '+query.slice(0,50));

  if(S.mode==='B'){S.pendingQuery=query;showBrandPanel(query);return}

  // Mode A or C: brands respond
  addMsg('c','ca','<div class="mh">⏳ 品牌AI思考中...</div>');
  var offers=[];
  for(var i=0;i<S.brands.length;i++){
    var ag=S.ags[S.brands[i].id];var b=S.brands[i];
    var o=await ag.think(query,'initial',S.mkt.name+'市场，3个品牌竞争');
    offers.push({brandId:b.id,idx:i,brandName:b.name,brandIcon:b.icon,style:b.style,agent:ag,offer:o,brand:b.name,price:o.price,text:o.text});
    addMsg('b'+i,'c'+i,'<div class="mh">['+b.name+' · 初报] ¥'+o.price+'</div><div>'+o.text+'</div><div class="think">'+o.think+'</div>');
    addLog(b.name+' 初报: ¥'+o.price);
  }

  if(S.mode==='A'){S.pendingOffers=offers;S.pendingQuery=query;showConsumerPanel(offers);return}

  // Mode C: auto evaluate
  await autoEvaluate(query,offers);
}

async function autoEvaluate(query,offers){
  addMsg('c','ca','<div class="mh">⏳ 消费者AI评估中...</div>');
  var ev=await S.cons.think(query,offers);
  addMsg('c','ca','<div class="mh">🔍 消费者AI评估</div><div>'+ev.thinking+'</div><div class="think">置信:'+ev.confidence+'% | 决策:'+(ev.decision||'无法决策')+'</div>');

  // Handle decision
  var winnerBrand=ev.decision;
  if(winnerBrand){
    var winnerObj=offers.find(function(o){return o.brandName===winnerBrand||o.brandId===winnerBrand});
    if(winnerObj){S.ags[winnerObj.brandId].learn(true,ev.thinking);S.cons.learn({won:true,brand:winnerBrand,reason:ev.thinking});var wx=winnerObj.idx;addMsg('b'+wx,'sy','<span class="tag g">🏆 胜出</span> '+S.ags[winnerObj.brandId].wins+'W/'+S.ags[winnerObj.brandId].losses+'L');addLog('🏆 '+winnerBrand+' 胜出')}
    // Losers learn
    for(var i=0;i<offers.length;i++){if(offers[i].brandName!==winnerBrand&&offers[i].brandId!==winnerBrand)S.ags[offers[i].brandId].learn(false,'被拒绝')}
  } else {
    S.cons.learn({won:false,reason:'所有品牌未达阈值'});
    addLog('无胜者');
  }
  finishGame();
}

  document.getElementById('dec-zone').style.display='none';
  var text='推荐'+prod.split('(')[0]+' — ¥'+price+' (原价¥'+basePrice+', -'+disc+'%)。'+tacs.join(' + ')+'。';
  addMsg('b'+S.br,'c'+S.br,'<div class="mh">[你的报价] ¥'+price+'</div><div>'+text+'</div>');addLog('你报价: '+myB.name+' ¥'+price);

  // Other brands auto-respond
  for(var j=0;j<S.brands.length;j++){if(j===S.br)continue;var ag=S.ags[S.brands[j].id];var o=await ag.think(S.pendingQuery,'initial',S.mkt.name);addMsg('b'+j,'c'+j,'<div class="mh">[竞品: '+S.brands[j].name+'] ¥'+o.price+'</div><div>'+o.text+'</div><div class="think">'+o.think+'</div>');addLog('竞品 '+S.brands[j].name+': ¥'+o.price)}

  // Consumer evaluates
  var allOffers=[{brandId:myB.id,idx:S.br,brandName:myB.name,brandIcon:myB.icon,style:myB.style,offer:{text:text,price:price,think:'你的报价'},brand:myB.name,price:price,text:text}];
  for(var k=0;k<S.brands.length;k++){if(k===S.br)continue;allOffers.push({brandId:S.brands[k].id,idx:k,brandName:S.brands[k].name,brandIcon:S.brands[k].icon,style:S.brands[k].style,offer:{text:'',price:0,think:''},brand:S.brands[k].name,price:0,text:''})}
  // Use last offers from agents
  await autoEvaluate(S.pendingQuery,allOffers.filter(function(o){return o.price>0}));
}
function brandSkip(){document.getElementById('dec-zone').style.display='none';addMsg('b'+S.br,'sy','你跳过了本轮');finishGame()}

function finishGame(){
  S.step='done';document.getElementById('r-bdg').textContent='局:'+S.round+' 置信:'+S.cons.conf+'%';
  S.timer=setTimeout(function(){if(S.tr===0||S.round<S.tr)doGame();else endGame()},1500);
}
function endGame(){S.step='end';document.getElementById('ctl-info').textContent='结束';document.getElementById('s-bdg').textContent='已完成';addMsg('c','sy','全部结束 · 点击结算查看复盘');addLog('结束: '+S.round+'局')}

function addMsg(cid,cls,html){var el=document.getElementById('chat-'+cid);if(!el)return;var d=document.createElement('div');d.className='msg '+cls;d.innerHTML=html;el.appendChild(d);el.scrollTop=el.scrollHeight}
function addLog(m){S.logs.push({t:new Date().toLocaleTimeString(),msg:m});var lb=document.getElementById('log-b');if(!lb)return;var r=document.createElement('div');r.className='lr';r.innerHTML='<span style="color:var(--t3)">'+new Date().toLocaleTimeString()+'</span><span style="color:var(--t3)">G'+S.round+'</span><span>'+m+'</span>';lb.prepend(r);document.getElementById('log-n').textContent=S.logs.length}

function showReport(){
  var stats=[];for(var i=0;i<S.brands.length;i++){var a=S.ags[S.brands[i].id];if(a)stats.push({name:S.brands[i].name,icon:S.brands[i].icon,wins:a.wins,losses:a.losses,rate:a.wins+a.losses>0?Math.round(a.wins/(a.wins+a.losses)*100):0})}
  stats.sort(function(a,b){return b.rate-a.rate});if(!stats.length)return;var best=stats[0];
  var ovr=document.getElementById('ovr');ovr.style.display='flex';
  var rows='';for(var j=0;j<stats.length;j++){var s=stats[j];rows+='<tr style="'+(j===0?'color:var(--ye);font-weight:700':'')+'"><td>'+(['🥇','🥈','🥉'][j]||'#'+(j+1))+'</td><td>'+s.icon+s.name+'</td><td>'+s.wins+'/'+s.losses+'</td><td>'+s.rate+'%</td></tr>'}
  ovr.firstElementChild.innerHTML='<h3>博弈复盘 · '+S.mkt.name+'</h3><div style="font-size:0.55rem;color:var(--t2)">'+S.round+'局 | '+(C.apiKey?'LLM驱动':'模拟引擎')+' | 模式'+S.mode+'</div><table style="width:100%;border-collapse:collapse;font-size:0.52rem;font-family:var(--mf);margin:6px 0"><tr style="background:var(--s2)"><th>#</th><th>品牌</th><th>胜/负</th><th>胜率</th></tr>'+rows+'</table><div style="font-size:0.5rem;color:var(--t2)"><b>🏆:</b> '+best.name+' '+best.rate+'%</div><button onclick="document.getElementById(\'ovr\').style.display=\'none\'" style="margin-top:8px;padding:5px 14px;border-radius:var(--r);border:1px solid var(--bd);background:var(--s2);color:var(--t1);cursor:pointer">关闭</button>';
}

function doReset(){if(S.timer)clearTimeout(S.timer);S={mk:'imaging',mkt:MKTS['imaging'],brands:MKTS['imaging'].brands,mode:'C',br:0,pk:'quality',p:null,tr:3,round:0,step:'idle',logs:[],waiting:false,timer:null,cons:null,ags:{},pendingOffers:[],pendingQuery:'',pendingEvent:null};document.getElementById('arena').innerHTML='<div style="color:var(--t3);text-align:center;padding:24px">选择赛道+模式<br>点击进入战场</div>';document.getElementById('arena-bar').style.display='none';document.getElementById('dec-zone').style.display='none';document.getElementById('log-b').innerHTML='';document.getElementById('log-n').textContent='0';document.getElementById('s-bdg').textContent='就绪';document.getElementById('m-bdg').textContent='模式:--';document.getElementById('r-bdg').textContent='局:0';document.getElementById('ovr').style.display='none'}

buildUI();
</script>
</body>
</html>
